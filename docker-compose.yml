version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: sewing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sewing_user
      POSTGRES_PASSWORD: sewing_pass_dev
      POSTGRES_DB: sewing_orders
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sewing_user -d sewing_orders']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sewing_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://sewing_user:sewing_pass_dev@db:5432/sewing_orders
    ports:
      - '5000:5000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sewing_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data: