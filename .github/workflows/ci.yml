name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sewing_user
          POSTGRES_PASSWORD: sewing_pass_dev
          POSTGRES_DB: sewing_orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend && npm install
          chmod +x node_modules/.bin/jest

      - name: Run database migrations
        env:
          PGPASSWORD: sewing_pass_dev
        run: |
          psql -h localhost -U sewing_user -d sewing_orders --set ON_ERROR_STOP=1 -f backend/src/db/init.sql
          echo "Migration complete"

      - name: Debug connection
        env:
          PGPASSWORD: sewing_pass_dev
        run: |
          psql -h localhost -U sewing_user -d sewing_orders -c "SELECT current_database();"
          psql -h localhost -U sewing_user -d sewing_orders -c "\dt"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sewing_user:sewing_pass_dev@localhost:5432/sewing_orders
          PORT: 5000
          NODE_ENV: test
        run: cd backend && npm test

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sewing-orders-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sewing-orders-frontend:latest